  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

amily: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"edb26bdd-f1bf-4011-b727-93f389d893c4\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"cce0e8c3-e555-4b82-8298-1d502816beeb\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"af903921-93af-4453-9f20-ad81eedfaf14\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Elias Arellano Campos — AI Engineer\n   Technical-editorial system\n   ============================================================ */\n\n:root{\n  /* surfaces */\n  --bg:        oklch(0.165 0.005 65);\n  --bg-2:      oklch(0.195 0.006 65);\n  --surface:   oklch(0.215 0.007 66);\n  --surface-2: oklch(0.255 0.008 66);\n\n  /* ink */\n  --ink:       oklch(0.965 0.004 85);\n  --ink-2:     oklch(0.80 0.006 80);\n  --muted:     oklch(0.66 0.008 78);\n  --faint:     oklch(0.52 0.008 78);\n\n  /* accent — luminous signal green */\n  --acc:       oklch(0.85 0.155 152);\n  --acc-deep:  oklch(0.72 0.15 152);\n  --acc-soft:  oklch(0.85 0.155 152 / 0.12);\n  --acc-line:  oklch(0.85 0.155 152 / 0.30);\n\n  /* hairlines */\n  --line:      oklch(1 0 0 / 0.085);\n  --line-2:    oklch(1 0 0 / 0.16);\n\n  --maxw: 1240px;\n  --pad: clamp(20px, 5vw, 64px);\n\n  --sans: \"IBM Plex Sans\", system-ui, sans-serif;\n  --disp: \"Space Grotesk\", \"IBM Plex Sans\", sans-serif;\n  --mono: \"IBM Plex Mono\", ui-monospace, monospace;\n\n  --ease: cubic-bezier(.22,.61,.36,1);\n}\n\n*{ box-sizing:border-box; margin:0; padding:0; }\nhtml{ scroll-behavior:smooth; -webkit-text-size-adjust:100%; }\nbody{\n  background:var(--bg);\n  color:var(--ink);\n  font-family:var(--sans);\n  font-size:16px;\n  line-height:1.55;\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  overflow-x:hidden;\n}\nbody::selection,*::selection{ background:var(--acc-soft); color:var(--ink); }\na{ color:inherit; text-decoration:none; }\nimg{ display:block; max-width:100%; }\n\n/* ---------- shared layout ---------- */\n.wrap{ max-width:var(--maxw); margin-inline:auto; padding-inline:var(--pad); }\n.section{ position:relative; padding-block:clamp(72px,11vh,140px); }\n.eyebrow{\n  font-family:var(--mono);\n  font-size:12px;\n  letter-spacing:.22em;\n  text-transform:uppercase;\n  color:var(--muted);\n  display:flex; align-items:center; gap:12px;\n}\n.eyebrow .num{ color:var(--acc); }\n.eyebrow::after{ content:\"\"; flex:1; height:1px; background:var(--line); }\n.eyebrow.tight::after{ display:none; }\n\n.h-sec{\n  font-family:var(--disp);\n  font-weight:600;\n  font-size:clamp(30px,4.6vw,56px);\n  line-height:1.02;\n  letter-spacing:-0.02em;\n  margin-top:22px;\n  text-wrap:balance;\n}\n.lead{\n  color:var(--ink-2);\n  font-size:clamp(16px,1.5vw,19px);\n  max-width:60ch;\n  margin-top:18px;\n  text-wrap:pretty;\n}\n\n/* ---------- nav ---------- */\n.nav{\n  position:fixed; inset:0 0 auto 0; z-index:50;\n  display:flex; align-items:center; justify-content:space-between;\n  padding:16px var(--pad);\n  background:oklch(0.165 0.005 65 / 0.6);\n  backdrop-filter:blur(14px) saturate(1.2);\n  border-bottom:1px solid transparent;\n  transition:border-color .4s var(--ease), background .4s var(--ease);\n}\n.nav.scrolled{ border-bottom-color:var(--line); background:oklch(0.15 0.005 65 / 0.82); }\n.brand{ display:flex; align-items:center; gap:11px; font-family:var(--mono); font-size:13px; letter-spacing:.04em; white-space:nowrap; min-width:0; }\n.brand b,.brand span{ white-space:nowrap; }\n.brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--acc); box-shadow:0 0 0 4px var(--acc-soft); animation:pulse 3.5s var(--ease) infinite; }\n@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 3px var(--acc-soft);} 50%{ box-shadow:0 0 0 7px transparent;} }\n.brand b{ font-weight:600; color:var(--ink); }\n.brand span{ color:var(--muted); }\n.nav-links{ display:flex; align-items:center; gap:26px; font-family:var(--mono); font-size:12.5px; letter-spacing:.04em; white-space:nowrap; }\n.nav-links a{ color:var(--muted); transition:color .25s var(--ease); position:relative; }\n.nav-links a:hover{ color:var(--ink); }\n.nav-links a.cta{ color:var(--bg); background:var(--acc); padding:9px 18px; border-radius:100px; font-weight:600; white-space:nowrap; }\n.nav-links a.cta:hover{ background:var(--ink); }\n.nav-links .hide-sm{ }\n@media(max-width:980px){ .nav-links a.hide-sm[href=\"#stack\"]{ display:none; } }\n@media(max-width:860px){ .nav-links .hide-sm{ display:none; } .brand span{ display:none; } }\n\n/* ---------- buttons ---------- */\n.btn{\n  display:inline-flex; align-items:center; gap:10px;\n  font-family:var(--mono); font-size:13px; letter-spacing:.03em; font-weight:500;\n  padding:13px 22px; border-radius:100px; border:1px solid var(--line-2);\n  color:var(--ink); background:transparent; cursor:pointer;\n  transition:all .28s var(--ease);\n}\n.btn:hover{ border-color:var(--acc-line); background:var(--acc-soft); transform:translateY(-1px); }\n.btn.primary{ background:var(--acc); color:var(--bg); border-color:var(--acc); font-weight:600; }\n.btn.primary:hover{ background:var(--ink); border-color:var(--ink); box-shadow:0 12px 40px -12px var(--acc); }\n.btn .arr{ transition:transform .28s var(--ease); }\n.btn:hover .arr{ transform:translate(3px,-3px); }\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero{ position:relative; min-height:100svh; display:flex; flex-direction:column; justify-content:center; padding-top:120px; padding-bottom:60px; overflow:hidden; }\n#wave{ position:absolute; inset:0; width:100%; height:100%; z-index:0; opacity:.55; }\n.hero::after{ /* vignette to keep text legible */\n  content:\"\"; position:absolute; inset:0; z-index:1; pointer-events:none;\n  background:radial-gradient(120% 90% at 15% 40%, transparent 30%, var(--bg) 92%);\n}\n.hero .wrap{ position:relative; z-index:2; width:100%; }\n\n.status{\n  display:inline-flex; align-items:center; gap:10px;\n  font-family:var(--mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase;\n  color:var(--acc); padding:7px 14px; border:1px solid var(--acc-line); border-radius:100px;\n  background:var(--acc-soft); margin-bottom:30px;\n}\n.status .led{ width:7px; height:7px; border-radius:50%; background:var(--acc); animation:pulse 2.4s infinite; }\n\n.hero h1{\n  font-family:var(--disp); font-weight:600;\n  font-size:clamp(44px,8.2vw,108px); line-height:0.93; letter-spacing:-0.035em;\n  text-wrap:balance;\n}\n.hero h1 .grad{ color:var(--acc); }\n.hero .sub{\n  margin-top:30px; max-width:54ch;\n  font-size:clamp(17px,1.8vw,22px); line-height:1.5; color:var(--ink-2); text-wrap:pretty;\n}\n.hero .sub b{ color:var(--ink); font-weight:600; }\n.hero-cta{ display:flex; flex-wrap:wrap; gap:14px; margin-top:38px; }\n.facts{\n  display:flex; flex-wrap:wrap; gap:0; margin-top:54px;\n  border-top:1px solid var(--line); padding-top:22px;\n}\n.fact{ padding-right:38px; margin-right:38px; border-right:1px solid var(--line); }\n.fact:last-child{ border-right:0; }\n.fact .k{ font-family:var(--mono); font-size:11px; letter-spacing:.16 { grid-template-columns:1fr;} .metric{ border-right:0; border-bottom:1px solid var(--line);} .metric:last-child{border-bottom:0;} }\n\n/* ============================================================\n   WORK\n   ============================================================ */\n.proj{\n  display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1.15fr); gap:clamp(24px,5vw,72px);\n  padding-block:clamp(40px,6vw,64px); border-top:1px solid var(--line);\n  align-items:start;\n}\n.proj:first-of-type{ border-top:0; }\n.proj.flagship{ display:block; }\n.proj-meta{ position:sticky; top:96px; }\n.proj-index{ font-family:var(--mono); font-size:12px; letter-spacing:.2em; color:var(--faint); }\n.proj-domain{ display:inline-flex; align-items:center; gap:8px; margin-top:14px; font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--acc); }\n.proj-domain .sq{ width:7px; height:7px; background:var(--acc); }\n.proj h3{ font-family:var(--disp); font-weight:600; font-size:clamp(26px,3.2vw,40px); line-height:1.05; letter-spacing:-0.02em; margin-top:16px; }\n.proj .blurb{ color:var(--ink-2); margin-top:16px; max-width:46ch; text-wrap:pretty; }\n.proj-link{ display:inline-flex; align-items:center; gap:9px; margin-top:22px; font-family:var(--mono); font-size:12.5px; letter-spacing:.03em; color:var(--ink); border-bottom:1px solid var(--line-2); padding-bottom:4px; transition:all .25s var(--ease); white-space:nowrap; }\n.proj-link:hover{ color:var(--acc); border-color:var(--acc-line); gap:13px; }\n\n.proj-body{ }\n.chip-row{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:26px; }\n.chip{\n  font-family:var(--mono); font-size:12px; letter-spacing:.02em;\n  padding:7px 13px; border-radius:8px; border:1px solid var(--line);\n  background:var(--surface); color:var(--ink-2);\n}\n.chip b{ color:var(--acc); font-weight:600; }\n\n.kpis{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); template-columns:18px 1fr 1fr; grid-template-rows:auto 1fr 1fr; gap:8px; }\n.cm-corner{}\n.cm-col{ grid-row:1; font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); text-align:center; padding-bottom:2px; align-self:end; }\n.cm-row{ writing-mode:vertical-rl; transform:rotate(180deg); font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); text-align:center; align-self:center; }\n.cm-cell{ border-radius:11px; padding:18px 14px; min-height:96px; display:flex; flex-direction:column; justify-content:center; gap:6px; border:1px solid; }\n.cm-cell .cmn{ font-family:var(--disp); font-weight:600; font-size:clamp(26px,3.4vw,40px); line-height:1; letter-spacing:-0.02em; font-feature-settings:\"tnum\"; }\n.cm-cell .cml{ font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; }\n.cm-cell.ok{ background:var(--acc-soft); border-color:var(--acc-line); }\n.cm-cell.ok .cmn{ color:var(--acc); } .cm-cell.ok .cml{ color:var(--acc-deep); }\n.cm-cell.err{ background:var(--warn-soft); border-color:var(--warn-line); }\n.cm-cell.err .cmn{ color:var(--warn); } .cm-cell.err .cml{ color:var(--warn); }\n.cm-cell.muted{ background:var(--bg-2); border-color:var(--line); }\n.cm-cell.muted .cmn{ color:var(--ink-2); } .cm-cell.muted .cml{ color:var(--faint); }\n.cm-cell .check{ font-size:24px; color:var(--acc); line-height:1; }\n\n/* ============================================================\n   CLASS-IMBALANCE BAR\n   ============================================================ */\n.imbalance{ }\n.imb-bar{ position:relative; height:52px; border-radius:11px; background:var(--surface-2); border:1px solid var(--line); overflow:hidden; }\n.imb-neg{ position:absolute; inset:0; display:flex; align-items:center; padding-left:18px; font-family:var(--mono); font-size:12px; color:var(--muted); }\n.imb-pos{ position:absolute; left:0; top:0; bottom:0; width:6px; backgrou --bg-2); font-family:var(--mono); font-size:11.5px; color:var(--muted); }\n.shot-cap .led{ width:7px; height:7px; border-radius:50%; background:var(--acc); flex:none; animation:pulse 2.4s infinite; }\n.shot-cap b{ color:var(--ink-2); font-weight:500; }\n\n/* ---- compact KPI strip (denser than the big .kpis grid) ---- */\n.kstrip{ display:flex; flex-wrap:wrap; gap:1px; background:var(--line); border:1px solid var(--line); border-radius:12px; overflow:hidden; margin-top:22px; }\n.kstrip .k{ flex:1 1 0; min-width:88px; background:var(--bg-2); padding:16px 16px; }\n.kstrip .k .n{ font-family:var(--disp); font-weight:600; font-size:clamp(20px,2.3vw,28px); line-height:1; color:var(--ink); letter-spacing:-0.02em; font-feature-settings:\"tnum\"; }\n.kstrip .k .n .u{ color:var(--acc); font-size:.6em; }\n.kstrip .k .l{ margin-top:8px; font-family:var(--mono); font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); line-height:1.35; }\n\n/* ---- two-up visual grid inside a project body ---- */\n.viz-2{ display:grid; grid-template-columns:1fr 1fr; gap:clamp(20px,3vw,32px); align-items:start; }\n@media(max-width:680px){ .viz-2{ grid-template-columns:1fr; } }\n.viz-block + .viz-block{ margin-top:30px; }\n\n/* ---- chip sets (real queries / rosters / factors) ---- */\n.chipset{ display:flex; flex-wrap:wrap; gap:8px; }\n.qc{\n  font-family:var(--mono); font-size:12px; letter-spacing:.01em;\n  padding:8px 12px; border:1px solid var(--line); border-radius:8px;\n  background:var(--surface); color:var(--ink-2); display:inline-flex; align-items:baseline; gap:7px;\n  transition:border-color .25s var(--ease);\n}\n.qc:hover{ border-color:var(--line-2); }\n.qc em{ color:var(--acc); font-style:normal; }\n.qc .qa{ color:var(--faint); font-size:10.5px; }\n\n/* ---- dataset stat strip (lighter than kstrip) ---- */\n.dstrip{ display:flex; flex-wrap:wrap; gap:0; border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--bg-2); }\n.dstrip .d{ flex:1 1 0; min-width:104px; padding:16px 18px; border-right:1px solid var(--line); }\n.dstrip .d:last-child{ border-right:0; }\n.dstrip .d .dn{ font-family:var(--disp); font-weight:600; font-size:clamp(19px,2.1vw,25px); line-height:1; color:var(--ink); letter-spacing:-0.02em; font-feature-settings:\"tnum\"; }\n.dstrip .d .dn .u{ color:var(--acc); font-size:.62em; }\n.dstrip .d .dl{ margin-top:8px; font-family:var(--mono); font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); line-height:1.35; }\n@media(max-width:560px){ .dstrip .d{ flex-basis:50%; border-bottom:1px solid var(--line); } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ============ NAV ============ -->\n<nav class=\"nav\" id=\"nav\">\n  <a class=\"brand\" href=\"#top\">\n    <span class=\"dot\"><\u002Fspan>\n    <b>Elias Arellano Campos<\u002Fb><span>/ AI Engineer<\u002Fspan>\n  <\u002Fa>\n  <div class=\"nav-links\">\n    <a href=\"#work\" class=\"hide-sm\">Work<\u002Fa>\n    <a href=\"#agent\" class=\"hide-sm\">Ask the agent<\u002Fa>\n    <a href=\"#stack\" class=\"hide-sm\">Stack<\u002Fa>\n    <a href=\"assets/Elias_Arellano_Campos_Resume.pdf\" download=\"Elias_Arellano_Campos_Resume.pdf\" target=\"_blank\" rel=\"noopener\" class=\"hide-sm\">Résumé ↗<\u002Fa>\n    <a href=\"#contact\" class=\"cta\">Get in touch<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ============ HERO ============ -->\n<header class=\"hero\" id=\"top\" data-screen-label=\"Hero\">\n  <canvas id=\"wave\"><\u002Fcanvas>\n  <div class=\"wrap\">\n    <div class=\"status reveal\"><span class=\"led\"><\u002Fspan> Open to AI / ML Engineer roles · Available May 2026<\u002Fdiv>\n    <h1 class=\"reveal\">\n      I build AI systems<br>that ship —<br><span class=\"grad\">and I measure<br>everything.<\u002Fspan>\n    <\u002Fh1>\n    <p class=\"sub reveal\">\n      <b>Elias Arellano Campos<\u002Fb> — AI Engineer specializing in <b>deep learning<\u002Fb> and <b>GenAI<\u002Fb>.\n      From 23-channel EEG seizure detection to RAG agents and production fraud models, I design\n      end-to-end systems and prove them with hard numbers.\n    <\u002Fp>\n    <div class=\"hero-cta reveal\">\n      <a href=\"#work\" class=\"btn primary\">See selected work <span class=\"arr\">↗<\u002Fspan><\u002Fa>\n      <a href=\"#agent\" class=\"btn\">Ask my AI agent <span class=\"arr\">↗<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"facts reveal\">\n      <div class=\"fact\"><div class=\"k\">Based in<\u002Fdiv><div class=\"v\">Houston, TX<\u002Fdiv><\u002Fdiv>\n      <div class=\"fact\"><div class=\"k\">Education<\u002Fdiv><div class=\"v\">B.S. CS — Magna Cum Laude<\u002Fdiv><\u002Fdiv>\n      <div class=\"fact\"><div class=\"k\">Focus<\u002Fdiv><div class=\"v\">Deep Learning · GenAI<\u002Fdiv><\u002Fdiv>\n      <div class=\"fact\"><div class=\"k\">Work auth<\u002Fdiv><div class=\"v\">U.S. OPT · No sponsorship<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"scrollcue\"><span class=\"bar\"><\u002Fspan> Scroll<\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============ METRICS ============ -->\n<section class=\"metrics\" aria-label=\"Headline results\">\n  <div class=\"grid\">\n    <div class=\"metric reveal\">\n      <div class=\"big\" data-count=\"0.9924\" data-dec=\"4\">0.0000<\u002Fdiv>\n      <div class=\"lab\">ROC-AUC on EEG seizure detection<\u002Fdiv>\n      <div class=\"ctx\">23-channel pediatric EEG · CHB-MIT<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"metric reveal\">\n      <div class=\"big\" data-count=\"97.1\" data-dec=\"1\">0.0<span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n      <div class=\"lab\">F1 on the fraud class<\u002Fdiv>\n      <div class=\"ctx\">108K-sample holdout · 0.999 ROC-AUC<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"metric reveal\">\n      <div class=\"big\"><span class=\"unit\">+<\u002Fspan><span data-count=\"47.7\" data-dec=\"1\">0.0<\u002Fspan><span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n      <div class=\"lab\">Retrieval precision over baseline<\u002Fdiv>\n      <div class=\"ctx\">SBERT semantic search · −83% docs<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"metric reveal\">\n      <div class=\"big\" data-count=\"210\" data-dec=\"0\">0<span class=\"unit\">K+<\u002Fspan><\u002Fdiv>\n      <div class=\"lab\">Reviews processed end-to-end<\u002Fdiv>\n      <div class=\"ctx\">Custom NLP preprocessing · Flask API<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ WORK ============ -->\n<main class=\"section wrap\" id=\"work\">\n  <div class=\"reveal\">\n    <div class=\"eyebrow\"><span class=\"num\">01<\u002Fspan> Selected work<\u002Fdiv>\n    <h2 class=\"h-sec\">Five systems, built end-to-end<br>and held to the numbers.<\u002Fh2>\n    <p class=\"lead\">Architecture, training, evaluation, deployment — straight from GitHub, every result reproducible. Skim the diagrams; the detail's in the repos.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- FLAGSHIP: EEG -->\n  <article class=\"proj flagship reveal\" data-screen-label=\"Project: EEG\">\n    <div class=\"proj-index\">PROJECT 01 — FLAGSHIP<\u002Fdiv>\n    <div class=\"proj-domain\"><span class=\"sq\"><\u002Fspan> Deep Learning · Healthcare<\u002Fdiv>\n    <h3>EEG Seizure Detection<\u002Fh3>\n    <p class=\"blurb\">Four architectures benchmarked for seizure-onset detection on 23-channel pediatric EEG — measuring exactly what temporal modeling adds.<\u002Fp>\n    <div class=\"stack\">\n      <span>PyTorch<\u002Fspan><span>MNE<\u002Fspan><span>CHB-MIT<\u002Fspan><span>CNN · GRU · LSTM · TCN<\u002Fspan><span>Saliency maps<\u002Fspan>\n    <\u002Fdiv>\n    <a class=\"proj-link\" href=\"https://github.com/ZAYNKD40/DataScience_Seizure_Project\" target=\"_blank\" rel=\"noopener\">View repository <span>↗<\u002Fspan><\u002Fa>\n\n    <div class=\"viz-block\" style=\"margin-top:34px\">\n      <div class=\"viz-title\">Dataset · CHB-MIT scalp EEG (PhysioNet)<\u002Fdiv>\n      <div class=\"dstrip\">\n        <div class=\"d\"><div class=\"dn\">23<\u002Fdiv><div class=\"dl\">Pediatric patients<\u002Fdiv><\u002Fdiv>\n        <div class=\"d\"><div class=\"dn\">~1,000<span class=\"u\">h<\u002Fspan><\u002Fdiv><div class=\"dl\">Recorded EEG<\u002Fdiv><\u002Fdiv>\n        <div class=\"d\"><div class=\"dn\">198<\u002Fdiv><div class=\"dl\">Labeled seizures<\u002Fdiv><\u002Fdiv>\n        <div class=\"d\"><div class=\"dn\">23<span class=\"u\">ch<\u002Fspan><\u002Fdiv><div class=\"dl\">256 Hz · EDF<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"viz-2\" style=\"margin-top:30px\">\n      <div>\n        <div class=\"viz-block\">\n          <div class=\"viz-title\">Inference pipeline<\u002Fdiv>\n          <div class=\"flow\">\n            <div class=\"flow-node\"><span class=\"fn-tag\">Input<\u002Fspan><span class=\"fn-label\">EEG · 23ch / 256Hz<\u002Fspan><\u002Fdiv>\n            <span class=\"flow-arrow\">→<\u002Fspan>\n            <div class=\"flow-node\"><span class=\"fn-tag\">Segment<\u002Fspan><span class=\"fn-label\">10s windows<\u002Fspan><\u002Fdiv>\n            <span class=\"flow-arrow\">→<\u002Fspan>\n            <div class=\"flow-node\"><span class=\"fn-tag\">Spatial<\u002Fspan><span class=\"fn-label\">CNN encoder<\u002Fspan><\u002Fdiv>\n            <span class=\"flow-arrow\">→<\u002Fspan>\n            <div class=\"flow-node acc\"><span class=\"fn-tag\">Temporal<\u002Fspan><span class=\"fn-label\">GRU<\u002Fspan><\u002Fdiv>\n            <span class=\"flow-arrow\">→<\u002Fspan>\n            <div class=\"flow-node\"><span class=\"fn-tag\">Decision<\u002Fspan><span class=\"fn-label\">Seizure / Clear<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"viz-block\">\n          <div class=\"viz-title\">The hard part · class imbalance<\u002Fdiv>\n          <div class=\"imbalance\">\n            <div class=\"imb-bar\">\n              <div class=\"imb-neg\">64,240 normal windows<\u002Fdiv>\n              <div class=\"imb-pos\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"imb-legend\">\n              <div class=\"it\"><span class=\"sw pos\"><\u002Fspan><span class=\"tx\"><b>149 seizure windows<\u002Fb><span>just 0.23% positive<\u002Fspan><\u002Fspan><\u002Fdiv>\n              <div class=\"it\"><span class=\"sw neg\"><\u002Fspan><span class=\"tx\"><b>64,389 total<\u002Fb><span>handled w/ weighted loss<\u002Fspan><\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"viz-block\">\n          <div class=\"viz-title\">Architecture benchmark · F1 score<\u002Fdiv>\n          <div class=\"barchart\">\n            <div class=\"bc-row best\"><span class=\"bc-label\">CNN + GRU<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"85.4\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">0.854<\u002Fspan><\u002Fdiv>\n            <div class=\"bc-row\"><span class=\"bc-label\">CNN + LSTM<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"80.2\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">0.802<\u002Fspan><\u002Fdiv>\n            <div class=\"bc-row\"><span class=\"bc-label\">TCN<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"72.2\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">0.722<\u002Fspan><\u002Fdiv>\n            <div class=\"bc-row\"><span class=\"bc-label\">CNN baseline<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"60.8\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">0.608<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"viz-cap\">Multi-patient test split (patients 1·2·3·5). <b>CNN+GRU<\u002Fb> won — F1 <b>0.854<\u002Fb>, AUC <b>0.9924<\u002Fb>, recall 0.814. Both temporal models beat the CNN baseline, confirming sequential modeling adds real value.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Farticle>\n\n  <!-- FRAUD -->\n  <article class=\"proj reveal\" data-screen-label=\"Project: Fraud\">\n    <div class=\"proj-meta\">\n      <div class=\"proj-index\">PROJECT 02<\u002Fdiv>\n      <div class=\"proj-domain\"><span class=\"sq\"><\u002Fspan> Machine Learning · Fintech<\u002Fdiv>\n      <h3>Fraud Detection System<\u002Fh3>\n      <p class=\"blurb\">Random Forest tuned for high recall with near-zero false alarms — every decision SHAP-explainable.<\u002Fp>\n      <div class=\"stack\"><span>scikit-learn<\u002Fspan><span>Random Forest<\u002Fspan><span>SHAP<\u002Fspan><span>pandas<\u002Fspan><\u002Fdiv>\n      <a class=\"proj-link\" href=\"https://github.com/E-techgod/fraud-detection-ml\" target=\"_blank\" rel=\"noopener\">View repository <span>↗<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"proj-body\">\n      <div class=\"viz-block\">\n        <div class=\"viz-title\">Confusion matrix · fraud class<\u002Fdiv>\n        <div class=\"cmatrix\">\n          <div class=\"cm-corner\"><\u002Fdiv>\n          <div class=\"cm-col\">Predicted fraud<\u002Fdiv>\n          <div class=\"cm-col\">Predicted legit<\u002Fdiv>\n          <div class=\"cm-row\">Actual fraud<\u002Fdiv>\n          <div class=\"cm-cell ok\"><span class=\"cmn\" data-count=\"2016\" data-dec=\"0\">0<\u002Fspan><span class=\"cml\">True positive · caught<\u002Fspan><\u002Fdiv>\n          <div class=\"cm-cell err\"><span class=\"cmn\">37<\u002Fspan><span class=\"cml\">False neg · missed<\u002Fspan><\u002Fdiv>\n          <div class=\"cm-row\">Actual legit<\u002Fdiv>\n          <div class=\"cm-cell err\"><span class=\"cmn\">84<\u002Fspan><span class=\"cml\">False pos · false alarm<\u002Fspan><\u002Fdiv>\n          <div class=\"cm-cell muted\"><span class=\"check\">✓<\u002Fspan><span class=\"cml\">True neg · cleared<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"viz-cap\">Holdout test set. <b>2,016<\u002Fb> fraud caught vs only <b>84<\u002Fb> false alarms; FN inferred from 98.2% recall. TN = the large majority of legitimate transactions, correctly cleared.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"viz-2\" style=\"margin-top:30px\">\n        <div class=\"viz-block\">\n          <div class=\"viz-title\">Separability · ROC-AUC<\u002Fdiv>\n          <div class=\"ring-wrap\">\n            <div class=\"ring\" style=\"--p:359.6\"><span class=\"rv\">0.999<\u002Fspan><\u002Fdiv>\n            <div class=\"ring-meta\">\n              <div class=\"rk\">ROC-AUC<\u002Fdiv>\n              <div class=\"rd\">Near-perfect separation between fraud and legitimate transactions across all thresholds.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"viz-block\">\n          <div class=\"viz-title\">Precision vs recall · fraud class<\u002Fdiv>\n          <div class=\"barchart\">\n            <div class=\"bc-row best\"><span class=\"bc-label\">Recall<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"98.2\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">98.2%<\u002Fspan><\u002Fdiv>\n            <div class=\"bc-row\"><span class=\"bc-label\">Precision<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"96.0\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">96.0%<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"viz-cap\">Tuned to <b>catch nearly all fraud<\u002Fb> (recall) while keeping false alarms low (precision) — the right tradeoff for a fraud screen.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kstrip\">\n        <div class=\"k\"><div class=\"n\">97.1<span class=\"u\">%<\u002Fspan><\u002Fdiv><div class=\"l\">F1 · fraud<\u002Fdiv><\u002Fdiv>\n        <div class=\"k\"><div class=\"n\">98.2<span class=\"u\">%<\u002Fspan><\u002Fdiv><div class=\"l\">Recall<\u002Fdiv><\u002Fdiv>\n        <div class=\"k\"><div class=\"n\">96.0<span class=\"u\">%<\u002Fspan><\u002Fdiv><div class=\"l\">Precision<\u002Fdiv><\u002Fdiv>\n        <div class=\"k\"><div class=\"n\">99.55<span class=\"u\">%<\u002Fspan><\u002Fdiv><div class=\"l\">Accuracy<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Farticle>\n\n  <!-- AMAZON -->\n  <article class=\"proj reveal\" data-screen-label=\"Project: Search\">\n    <div class=\"proj-meta\">\n      <div class=\"proj-index\">PROJECT 03<\u002Fdiv>\n      <div class=\"proj-domain\"><span class=\"sq\"><\u002Fspan> NLP · Information Retrieval<\u002Fdiv>\n      <h3>Amazon Opinion<br>Search Engine<\u002Fh3>\n      <p class=\"blurb\">Swapped Boolean keyword search for SBERT semantic retrieval over 210K+ reviews — higher precision, far less noise.<\u002Fp>\n      <div class=\"stack\"><span>SBERT<\u002Fspan><span>NLP<\u002Fspan><span>Flask<\u002Fspan><span>Inverted index<\u002Fspan><\u002Fdiv>\n      <a class=\"proj-link\" href=\"https://github.com/E-techgod/amazon_search_engine\" target=\"_blank\" rel=\"noopener\">View repository <span>↗<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"proj-body\">\n      <div class=\"viz-block\">\n        <div class=\"viz-title\">Retrieval pipeline<\u002Fdiv>\n        <div class=\"flow\">\n          <div class=\"flow-node\"><span class=\"fn-tag\">Query<\u002Fspan><span class=\"fn-label\">\"audio quality: poor\"<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-tag\">Clean<\u002Fspan><span class=\"fn-label\">Preprocess<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node acc\"><span class=\"fn-tag\">Embed<\u002Fspan><span class=\"fn-label\">SBERT<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-tag\">Match<\u002Fspan><span class=\"fn-label\">Cosine top-k<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-tag\">Output<\u002Fspan><span class=\"fn-label\">Ranked reviews<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viz-2\" style=\"margin-top:30px\">\n        <div class=\"viz-block\">\n          <div class=\"viz-title\">Avg precision ↑ (higher better)<\u002Fdiv>\n          <div class=\"barchart\">\n            <div class=\"bc-row best\"><span class=\"bc-label\">SBERT<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"57.8\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">0.578<\u002Fspan><\u002Fdiv>\n            <div class=\"bc-row\"><span class=\"bc-label\">Lang. model<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"55.0\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">0.550<\u002Fspan><\u002Fdiv>\n            <div class=\"bc-row\"><span class=\"bc-label\">Boolean<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"39.1\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">0.391<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"viz-block\">\n          <div class=\"viz-title\">Docs retrieved ↓ (lower better)<\u002Fdiv>\n          <div class=\"barchart\">\n            <div class=\"bc-row down\"><span class=\"bc-label\">Boolean<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"100\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">1,278<\u002Fspan><\u002Fdiv>\n            <div class=\"bc-row down\"><span class=\"bc-label\">Lang. model<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"45.5\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">582<\u002Fspan><\u002Fdiv>\n            <div class=\"bc-row best\"><span class=\"bc-label\">SBERT<\u002Fspan><span class=\"bc-track\"><span class=\"bc-fill\" data-w=\"16.9\"><\u002Fspan><\u002Fspan><span class=\"bc-val\">216<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"viz-cap\">Five real-world opinion queries · <b>+47.7%<\u002Fb> precision (0.39 → 0.58) while cutting retrieved docs <b>83%<\u002Fb>. Deployed as a Flask API.<\u002Fp>\n      <div class=\"viz-block\" style=\"margin-top:28px\">\n        <div class=\"viz-title\">Evaluation queries · aspect → opinion<\u002Fdiv>\n        <div class=\"chipset\">\n          <span class=\"qc\">audio quality <span class=\"qa\">→<\u002Fspan> <em>poor<\u002Fem><\u002Fspan>\n          <span class=\"qc\">wifi signal <span class=\"qa\">→<\u002Fspan> <em>strong<\u002Fem><\u002Fspan>\n          <span class=\"qc\">mouse button <span class=\"qa\">→<\u002Fspan> <em>click problem<\u002Fem><\u002Fspan>\n          <span class=\"qc\">gps map <span class=\"qa\">→<\u002Fspan> <em>useful<\u002Fem><\u002Fspan>\n          <span class=\"qc\">image quality <span class=\"qa\">→<\u002Fspan> <em>sharp<\u002Fem><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Farticle>\n\n  <!-- F1 CV -->\n  <article class=\"proj reveal\" data-screen-label=\"Project: F1\">\n    <div class=\"proj-meta\">\n      <div class=\"proj-index\">PROJECT 04<\u002Fdiv>\n      <div class=\"proj-domain\"><span class=\"sq\"><\u002Fspan> Computer Vision · Real-time<\u002Fdiv>\n      <h3>F1 Driver<br>Recognition<\u002Fh3>\n      <p class=\"blurb\">Real-time perception: webcam → face ID → API logging → live dashboard, recognition and overlay in under 100ms.<\u002Fp>\n      <div class=\"stack\"><span>OpenCV<\u002Fspan><span>KNN<\u002Fspan><span>Streamlit<\u002Fspan><span>Flask<\u002Fspan><span>SQLite<\u002Fspan><\u002Fdiv>\n      <a class=\"proj-link\" href=\"https://github.com/E-techgod/f1_driver_recognition\" target=\"_blank\" rel=\"noopener\">View repository <span>↗<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"proj-body\">\n      <div class=\"viz-block\">\n        <div class=\"shot\">\n          <img src=\"10fb2bb4-bff4-479e-8187-fb1b922942ec\" alt=\"Live F1 driver recognition: green bounding box around the detected face, name label, and a real-time stats dossier overlay\" loading=\"lazy\">\n          <div class=\"shot-cap\"><span class=\"led\"><\u002Fspan> <b>Live capture<\u002Fb> — face detected → driver identified → stats dossier rendered, &lt;100ms<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viz-block\">\n        <div class=\"viz-title\">Pipeline architecture<\u002Fdiv>\n        <div class=\"flow\">\n          <div class=\"flow-node\"><span class=\"fn-tag\">Capture<\u002Fspan><span class=\"fn-label\">Webcam<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-tag\">Detect<\u002Fspan><span class=\"fn-label\">Haar cascade<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node acc\"><span class=\"fn-tag\">Classify<\u002Fspan><span class=\"fn-label\">KNN face ID<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-tag\">Log<\u002Fspan><span class=\"fn-label\">Flask → SQLite<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-tag\">Visualize<\u002Fspan><span class=\"fn-label\">Streamlit<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kstrip\">\n        <div class=\"k\"><div class=\"n\">&lt;100<span class=\"u\">ms<\u002Fspan><\u002Fdiv><div class=\"l\">Detect → overlay<\u002Fdiv><\u002Fdiv>\n        <div class=\"k\"><div class=\"n\">10<\u002Fdiv><div class=\"l\">Drivers<\u002Fdiv><\u002Fdiv>\n        <div class=\"k\"><div class=\"n\">0–100<\u002Fdiv><div class=\"l\">Fantasy score<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viz-block\" style=\"margin-top:30px\">\n        <div class=\"viz-title\">Driver roster · trained classes<\u002Fdiv>\n        <div class=\"chipset\">\n          <span class=\"qc\">Verstappen<\u002Fspan><span class=\"qc\">Hamilton<\u002Fspan><span class=\"qc\">Leclerc<\u002Fspan>\n          <span class=\"qc\">Piastri<\u002Fspan><span class=\"qc\">Norris<\u002Fspan><span class=\"qc\">Antonelli<\u002Fspan>\n          <span class=\"qc\">Alonso<\u002Fspan><span class=\"qc\">Sainz<\u002Fspan><span class=\"qc\">Albon<\u002Fspan><span class=\"qc\">Russell<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"viz-block\">\n        <div class=\"viz-title\">Fantasy scoring engine · weighted factors<\u002Fdiv>\n        <div class=\"chipset\">\n          <span class=\"qc\">Wins<\u002Fspan><span class=\"qc\">Podiums<\u002Fspan><span class=\"qc\">Points / race<\u002Fspan>\n          <span class=\"qc\">Win → podium conv.<\u002Fspan><span class=\"qc\">Pole → win conv.<\u002Fspan>\n          <span class=\"qc\">Fastest laps<\u002Fspan><span class=\"qc\">DNF rate <em>penalty<\u002Fem><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Farticle>\n\n  <!-- RAG -->\n  <article class=\"proj reveal\" data-screen-label=\"Project: RAG\">\n    <div class=\"proj-meta\">\n      <div class=\"proj-index\">PROJECT 05<\u002Fdiv>\n      <div class=\"proj-domain\"><span class=\"sq\"><\u002Fspan> GenAI · Retrieval-Augmented<\u002Fdiv>\n      <h3>RAG Document<br>Q&amp;A Agent<\u002Fh3>\n      <p class=\"blurb\">Retrieval-augmented Q&amp;A over PDFs and text — TF-IDF retrieval feeding Claude for cited, grounded answers.<\u002Fp>\n      <div class=\"stack\"><span>Claude API<\u002Fspan><span>pdf.js<\u002Fspan><span>TF-IDF<\u002Fspan><span>RAG<\u002Fspan><\u002Fdiv>\n      <a class=\"proj-link\" href=\"#agent\">Try the live agent below <span>↓<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n    <div class=\"proj-body\">\n      <div class=\"viz-block\">\n        <div class=\"viz-title\">Retrieval-augmented generation flow<\u002Fdiv>\n        <div class=\"flow\">\n          <div class=\"flow-node\"><span class=\"fn-tag\">Source<\u002Fspan><span class=\"fn-label\">PDF / text<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-tag\">Split<\u002Fspan><span class=\"fn-label\">Overlapping chunks<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-tag\">Index<\u002Fspan><span class=\"fn-label\">TF-IDF<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-tag\">Retrieve<\u002Fspan><span class=\"fn-label\">Cosine top-k<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node acc\"><span class=\"fn-tag\">Generate<\u002Fspan><span class=\"fn-label\">Claude<\u002Fspan><\u002Fdiv>\n          <span class=\"flow-arrow\">→<\u002Fspan>\n          <div class=\"flow-node\"><span class=\"fn-tag\">Answer<\u002Fspan><span class=\"fn-label\">Cited + grounded<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"viz-cap\">Overlapping chunks prevent context fragmentation; answers carry <b>source attribution<\u002Fb> back to the retrieved passages. The same pattern powers the live agent below.<\u002Fp>\n        <div class=\"chipset\" style=\"margin-top:22px\">\n          <span class=\"qc\">PDF + text ingestion<\u002Fspan>\n          <span class=\"qc\">Overlapping chunks<\u002Fspan>\n          <span class=\"qc\">TF-IDF + cosine<\u002Fspan>\n          <span class=\"qc\">Similarity scoring<\u002Fspan>\n          <span class=\"qc\">Source-attributed <em>answers<\u002Fem><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Farticle>\n<\u002Fmain>\n\n<!-- ============ ASK THE AGENT ============ -->\n<section class=\"agent-sec section\" id=\"agent\" data-screen-label=\"Ask the agent\">\n  <div class=\"wrap\">\n    <div class=\"agent-head reveal\">\n      <div class=\"eyebrow\"><span class=\"num\">02<\u002Fspan> Proof, not promises<\u002Fdiv>\n      <h2 class=\"h-sec\">Don't read about my GenAI work.<br>Talk to it.<\u002Fh2>\n      <p class=\"lead\">This terminal is a retrieval-grounded agent that answers questions about my background using my real résumé and project data — built with the same RAG pattern as Project 05. Ask it anything.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"term reveal\">\n      <div class=\"term-bar\">\n        <div class=\"term-dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n        <div class=\"term-title\"><b>elias-agent<\u002Fb> — grounded on résumé + GitHub<\u002Fdiv>\n        <div class=\"term-status\"><span class=\"led\"><\u002Fspan> online<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"term-body\" id=\"termBody\">\n        <div class=\"msg bot\">\n          <div class=\"av\">EA<\u002Fdiv>\n          <div class=\"body\">\n            <div class=\"who\">elias-agent<\u002Fdiv>\n            Hi — I'm Elias's portfolio agent. I can answer questions about his projects, results, skills, and availability, grounded in his real data. Try a question below, or type your own.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"term-foot\">\n        <div class=\"suggest\" id=\"suggest\">\n          <button data-q=\"What's the most impressive result on this page?\">Most impressive result?<\u002Fbutton>\n          <button data-q=\"Summarize the EEG seizure detection project and why it matters.\">EEG project deep-dive<\u002Fbutton>\n          <button data-q=\"What's Elias's experience with GenAI, LLMs and RAG?\">GenAI &amp; RAG experience<\u002Fbutton>\n          <button data-q=\"Why should I hire Elias as an AI Engineer?\">Why hire Elias?<\u002Fbutton>\n          <button data-q=\"What's his work authorization and availability?\">Availability &amp; work auth<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"inputrow\">\n          <span class=\"prompt\">›<\u002Fspan>\n          <input id=\"agentInput\" type=\"text\" placeholder=\"Ask about Elias's work, results, or availability…\" autocomplete=\"off\">\n          <button class=\"send\" id=\"agentSend\" aria-label=\"Send\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" >Face recognition · KNN<\u002Fli>\n        <li>SHAP attributions<\u002Fli>\n        <li>Saliency maps<\u002Fli>\n        <li>Per-cohort error analysis<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"cap\">\n      <div class=\"h\">Deploy &amp; Tooling<\u002Fdiv>\n      <ul>\n        <li>Flask REST APIs<\u002Fli>\n        <li>Streamlit · Shiny dashboards<\u002Fli>\n        <li>Python · R · SQL · C++ · Java<\u002Fli>\n        <li>Git · Linux · Jupyter<\u002Fli>\n        <li>SQLite · data pipelines<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ABOUT + CONTACT ============ -->\n<section class=\"section wrap\" id=\"contact\">\n  <div class=\"reveal\" style=\"margin-bottom:54px\">\n    <div class=\"eyebrow\"><span class=\"num\">04<\u002Fspan> About &amp; contact<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"about-grid\">\n    <div class=\"about-body reveal\">\n      <p class=\"lq\">I'm an AI Engineer who treats <em>evaluation<\u002Fem> as a first-class part of building — not an afterthought.<\u002Fp>\n      <p>I'm finishing a <b>B.S. in Computer Science<\u002Fb> at the University of Houston (Magna Cum Laude, Dean's List) with a concentration in <b>Data Science &amp; Machine Learning<\u002Fb> and a minor in Mathematics.<\u002Fp>\n      <p>My work spans deep learning for healthcare, production fraud detection, semantic search, real-time computer vision, and retrieval-augmented GenAI. What ties it together: I ship complete systems and back every claim with reproducible metrics, explainability, and honest error analysis.<\u002Fp>\n      <p>I'm <b>fluent in English and a native Spanish speaker<\u002Fb>, based in Houston, and <b>available May 2026<\u002Fb> on U.S. OPT — TN-visa eligible, with no H-1B sponsorship required.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"contact-card reveal\">\n      <div class=\"top\">\n        <div class=\"h\">Let's build something measurable.<\u002Fdiv>\n        <p>Open to AI / ML Eng z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span class=\"t\"><span class=\"k\">GitHub<\u002Fspan><span class=\"v\">github.com/E-techgod<\u002Fspan><\u002Fspan>\n        <span class=\"arr\">↗<\u002Fspan>\n      <\u002Fa>\n      <a class=\"clink\" href=\"assets/Elias_Arellano_Campos_Resume.pdf\" download=\"Elias_Arellano_Campos_Resume.pdf\" target=\"_blank\" rel=\"noopener\">\n        <span class=\"ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><path d=\"M12 18v-6\"><\u002Fpath><path d=\"m9 15 3 3 3-3\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span class=\"t\"><span class=\"k\">Résumé<\u002Fspan><span class=\"v\">Download PDF<\u002Fspan><\u002Fspan>\n        <span class=\"arr\">↗<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer class=\"footer\">\n  <div class=\"wrap\">\n    <div class=\"l\">© 2026 <b>Elias Arellano Campos<\u002Fb> · AI Engineer · Houston, TX<\u002Fdiv>\n    <div class=\"r\">\n      <a href=\"mailto:elias.arellano.campos@gmail.com\">Email<\u002Fa>\n      <a href=\"https://github.com/E-techgod\" target=\"_blank\">GitHub<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/eliasarellanocampos\" target=\"_blank\" rel=\"noopener noreferrer\">LinkedIn<\u002Fa>\n      <a href=\"#top\">Top ↑<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n/* =========================================================\n   Elias Arellano Campos — portfolio interactions\n   ========================================================= */\n(function () {\n  \"use strict\";\n  const reduce = window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n\n  /* ---------- nav shadow on scroll ---------- */\n  const nav = document.getElementById(\"nav\");\n  const onScroll = () => nav.classList.toggle(\"scrolled\", window.scrollY > 24);\n  onScroll();\n  window.addEventListener(\"scroll\", onScroll, { passive: true });\n\n  /* ---------- reveal on scroll ---------- */\n  const revs = [...document.querySelectorAll(\".reveal\")];\n  if (reduce) {\n    revs.forEach((r) => r.classList.add(\"in\"));\n  } else {\n    const io = new IntersectionObserver(\n      (entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            e.target.classList.add(\"in\");\n            io.unobserve(e.target);\n          }\n        });\n      },\n      { threshold: 0.12, rootMargin: \"0px 0px -8% 0px\" }\n    );\n    revs.forEach((r) => io.observe(r));\n  }\n\n  /* ---------- animated count-up ---------- */\n  function animateCount(el) {\n    const target = parseFloat(el.dataset.count);\n    const dec = parseInt(el.dataset.dec || \"0\", 10);\n    const unitSpan = el.querySelector(\".unit\");\n    const unitHTML = unitSpan ? unitSpan.outerHTML : \"\";\n    if (reduce) {\n      el.innerHTML = target.toFixed(dec) + unitHTML;\n      return;\n    }\n    const dur = 1500;\n    const t0 = performance.now();\n    function frame(now) {\n      const p = Math.min(1, (now - t0) / dur);\n      const eased = 1 - Math.pow(1 - p, 3);\n      const val = (target * eased).toFixed(dec);\n      el.innerHTML = val + unitHTML;\n      if (p < 1) requestAnimationFrame(frame);\n      else el.innerHTML = target.toFixed(dec) + unitHTML;\n    }\n    requestAnimationFrame(frame);\n  }\n  const counters = [...document.querySelectorAll(\"[data-count]\")];\n  const cio = new IntersectionObserver(\n    (entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          animateCount(e.target);\n          cio.unobserve(e.target);\n        }\n      });\n    },\n    { threshold: 0.5 }\n  );\n  counters.forEach((c) => cio.observe(c));\n\n  /* ---------- bar fills (charts) ---------- */\n  const bio = new IntersectionObserver(\n    (entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          const el = e.target;\n          const w = parseFloat(el.dataset.w);\n          requestAnimationFrame(() => {\n            el.style.width = (isNaN(w) ? 0 : w) + \"%\";\n          });\n          bio.unobserve(el);\n        }\n      });\n    },\n    { threshold: 0.1 }\n  );\n  document.querySelectorAll(\".bar i, .bc-fill\").forEach((i) => {\n    i.style.width = \"0%\";\n    bio.observe(i);\n  });\n\n  /* =========================================================\n     HERO WAVEFORM — oscilloscope / EEG signal motif\n     ========================================================= */\n  const canvas = document.getElementById(\"wave\");\n  if (canvas && !reduce) {\n    const ctx = canvas.getContext(\"2d\");\n    let W, H, dpr;\n    const accent = \"151, 222, 168\";\n    function resize() {\n      dpr = Math.min(2, window.devicePixelRatio || 1);\n      W = canvas.clientWidth;\n      H = canvas.clientHeight;\n      canvas.width = W * dpr;\n      canvas.height = H * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n    }\n    resize();\n    window.addEventListener(\"resize\", resize);\n\n    const channels = 5;\n    function rng(seed) {\n      return function () {\n        seed = (seed * 9301 + 49297) % 233280;\n        return seed / 233280;\n      };\n    }\n    const seeds = Array.from({ length: channels }, (_, i) => rng(i * 97 + 11));\n\n    let t = 0;\n    function noiseLine(yBase, amp, freq, phase, rand) {\n      ctx.beginPath();\n      const step = 6;\n      for (let x = 0; x <= W; x += step) {\n        const n =\n          Math.sin(x * freq + phase) * amp +\n          Math.sin(x * freq * 2.3 + phase * 1.7) * amp * 0.4 +\n          (rand(x) - 0.5) * amp * 0.7;\n        const burst =\n          Math.exp(-Math.pow(((x / W) * 6 + Math.sin(phase * 0.5)) % 6 - 3, 2) * 2) *\n          amp *\n          2.4 *\n          Math.max(0, Math.sin(phase * 0.6));\n        const y = yBase + n - burst;\n        if (x === 0) ctx.moveTo(x, y);\n        else ctx.lineTo(x, y);\n      }\n    }\n    function draw() {\n      ctx.clearRect(0, 0, W, H);\n      const gap = H / (channels + 1);\n      for (let c = 0; c < channels; c++) {\n        const yBase = gap * (c + 1);\n        const amp = gap * 0.34;\n        const freq = 0.012 + c * 0.0026;\n        const phase = t * (0.9 + c * 0.18) + c * 1.3;\n        const fade = 0.16 + 0.12 * Math.abs(Math.sin(t * 0.3 + c));\n        ctx.strokeStyle = `rgba(${accent}, ${fade})`;\n        ctx.lineWidth = 1.4;\n        const r = seeds[c];\n        let cache = {};\n        const rand = (x) => {\n          if (cache[x] === undefined) cache[x] = r();\n          return cache[x];\n        };\n        noiseLine(yBase, amp, freq, phase, rand);\n        ctx.stroke();\n      }\n      t += 0.025;\n      requestAnimationFrame(draw);\n    }\n    draw();\n  }\n\n  /* =========================================================\n     ASK THE AGENT — Claude-grounded Q&A\n     ========================================================= */\n  const PROFILE = `\nYou are \"elias-agent\", the portfolio AI assistant for Elias Arellano Campos. You answer questions from recruiters, hiring managers, and collaborators visiting his portfolio. Speak in third person about Elias, in a confident, concise, factual tone. Keep answers to 2-5 short sentences unless asked for detail. Use only the facts below; if something isn't covered, say you don't have that detail and suggest emailing Elias. Never invent metrics or employers. Lightly encourage getting in touch when relevant.\n\n=== IDENTITY ===\nName: Elias Arellano Campos. Role: AI Engineer (specialties: deep learning + Generative AI).\nLocation: Houston, TX. Languages: English (fluent), Spanish (native).\nEducation: B.S. Computer Science, University of Houston, graduating May 2026. Minor in Mathematics. Concentration: Data Science & Machine Learning. Honors: Dean's List, Magna Cum Laude.\nWork authorization: U.S. OPT active, TN Visa eligible, does NOT require H-1B sponsorship. Available May 2026.\nContact: elias.arellano.campos@gmail.com | linkedin.com/in/eliasarellanocampos | github.com/E-techgod.\n\n=== POSITIONING / EDGE ===\nBuilds complete end-to-end ML and GenAI systems (architecture -> training -> evaluation -> explainability -> deployment) and backs every claim with reproducible, quantified results. Treats evaluation and error analysis as first-class. Strong at imbalanced data, explainability (SHAP, saliency maps), and shipping via REST APIs and dashboards.\n\n=== PROJECTS (all real, on GitHub) ===\n1) EEG Seizure Detection (FLAGSHIP) — PyTorch, MNE, CHB-MIT. Built at the Hewlett Packard Enterprise Data Science Institute, University of Houston (advisor Dr. Nouhad Rizk), as a team with Khoa Anh Dao and John C Williams. Designed & compared 4 architectures (CNN, CNN+LSTM, CNN+GRU, TCN) for binary seizure detection on 23-channel pediatric EEG. Best results: CNN+GRU reached F1 0.8537 and AUC 0.9924; CNN+LSTM had highest recall 0.8256. Handled a severe ~0.23% positive rate with weighted loss, threshold optimization, LR scheduling, gradient clipping. Added saliency-map explainability and per-patient error analysis. Temporal models beat the CNN baseline (F1 0.6082), confirming the hypothesis that sequential modeling helps.\n\n2) Fraud Detection System — Python, scikit-learn, Random Forest, SHAP, pandas. 97.1% F1 on the fraud class, 98.2% recall, 96.0% precision, 0.999 ROC-AUC, 99.55% overall accuracy on a 108K-sample balanced holdout. Only 84 false positives against 2,016 correctly identified fraud cases. SHAP for global + per-prediction explanations.\n\n3) Amazon Review Opinion Search Engine — Python, SBERT, NLP, Flask. Semantic opinion search over 210,000+ Amazon reviews. SBERT semantic retrieval lifted average precision +47.7% (0.39 -> 0.58) while cutting retrieved documents by 83%, across 5 real-world opinion queries. Custom preprocessing showed cleaner data beats larger unfiltered sets. Deployed as a Flask API for real-time query.\n\n4) F1 Driver Recognition — OpenCV, KNN, Haar cascades, Streamlit, Flask, SQLite. Real-time computer vision pipeline: webcam capture -> KNN face classification -> Flask API attendance logging (CSV + SQLite) -> live Streamlit dashboard with driver stats and a normalized 0-100 fantasy leaderboard. Recognition + overlay in under 100ms. Recognizes 10 drivers. Architecture maps to industrial worker-ID and assembly-line recognition.\n\n5) RAG Document Q&A Agent — Python, JavaScript, Claude API, pdf.js. End-to-end retrieval-augmented pipeline with TF-IDF indexing + cosine-similarity retrieval, supporting text and PDF ingestion. Claude LLM API for context-grounded, source-attributed answers. Configurable overlapping-chunk strategy prevents context fragmentation. (This portfolio's live agent uses the same RAG pattern.)\n\n=== SKILLS ===\nProgramming: Python, R, SQL, C++, Java.\nML & AI: PyTorch, TensorFlow, scikit-learn, XGBoost, NumPy, pandas, SHAP, NLP, Deep Learning, GenAI, LLM APIs, Prompt Engineering, RAG, REST APIs.\nComputer Vision: OpenCV, MediaPipe.\nWeb & Tools: Flask, Streamlit, Shiny, Git, Linux, Jupyter, VS Code.\n\n=== APPLIED EXPERIENCE (2024-2025) ===\nDesigned/deployed end-to-end GenAI apps integrating LLM APIs with custom retrieval pipelines, prompt engineering, and context-grounded generation. Built and productionized deep learning systems over large datasets through evaluation and REST API deployment. Enabled real-time inference via Flask APIs and Streamlit dashboards. Applied SHAP and saliency maps to validate behavior and find failure modes.\n`.trim();\n\n  const body = document.getElementById(\"termBody\");\n  const input = document.getElementById(\"agentInput\");\n  const sendBtn = document.getElementById(\"agentSend\");\n  const suggest = document.getElementById(\"suggest\");\n  const MAX_MSGS = 4;\n  let sessionCount = 0;\n  let busy = false;\n  const convo = []; // [{role:'user'|'assistant', content}]\n  const leftEl = document.getElementById(\"msgLeft\");\n\n  function updateCounter() {\n    const left = Math.max(0, MAX_MSGS - sessionCount);\n    if (leftEl) leftEl.textContent = left + \" left\";\n  }\n\n  function lockInput() {\n    input.disabled = true;\n    sendBtn.disabled = true;\n    input.value = \"\";\n    input.placeholder = \"Message limit reached — email Elias to keep talking\";\n    suggest.style.display = \"none\";\n  }\n\n  function addMsg(role, text) {\n    const wrap = document.createElement(\"div\");\n    wrap.className = \"msg \" + (role === \"user\" ? \"user\" : \"bot\");\n    wrap.innerHTML =\n      '<div class=\"av\">' + (role === \"user\" ? \"you\" : \"EA\") + '<\u002Fdiv>' +\n      '<div class=\"body\"><div class=\"who\">' + (role === \"user\" ? \"you\" : \"elias-agent\") + '<\u002Fdiv><span class=\"txt\"><\u002Fspan><\u002Fdiv>';\n    wrap.querySelector(\".txt\").textContent = text;\n    body.appendChild(wrap);\n    body.scrollTop = body.scrollHeight;\n    return wrap.querySelector(\".txt\");\n  }\n\n  function addTyping() {\n    const wrap = document.createElement(\"div\");\n    wrap.className = \"msg bot\";\n    wrap.innerHTML = '<div class=\"av\">EA<\u002Fdiv><div class=\"body\"><div class=\"who\">elias-agent<\u002Fdiv><span class=\"typing\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan><\u002Fdiv>';\n    body.appendChild(wrap);\n    body.scrollTop = body.scrollHeight;\n    return wrap;\n  }\n\n  function renderRich(el, text) {\n    el.innerHTML = \"\";\n    const parts = text.split(/(\\*\\*[^*]+\\*\\*)/g);\n    parts.forEach((p) => {\n      if (/^\\*\\*[^*]+\\*\\*$/.test(p)) {\n        const b = document.createElement(\"b\");\n        b.textContent = p.slice(2, -2);\n        el.appendChild(b);\n      } else {\n        el.appendChild(document.createTextNode(p));\n      }\n    });\n  }\n\n  // Try the real backend (Vercel function) first; fall back to the\n  // in-preview window.claude helper so this works in both places.\n  async function getReply(messages) {\n    try {\n      const r = await fetch(\"/api/chat\", {\n        method: \"POST\",\n        headers: { \"content-type\": \"application/json\" },\n        body: JSON.stringify({ messages: messages }),\n      });\n      if (r.ok) {\n        const data = await r.json();\n        if (data && typeof data.text === \"string\" && data.text.trim()) return data.text.trim();\n      }\n      throw new Error(\"backend unavailable\");\n    } catch (e) {\n      // Fallback: preview environment with window.claude available\n      if (window.claude && window.claude.complete) {\n        const rendered = messages\n          .map((m) => (m.role === \"user\" ? \"Visitor: \" : \"elias-agent: \") + m.content)\n          .join(\"\\n\");\n        const prompt =\n          PROFILE +\n          \"\\n\\n=== CONVERSATION SO FAR ===\\n\" +\n          rendered +\n          \"\\n\\nWrite elias-agent's next reply. Be concise and factual. You may use **bold** for key metrics. Do not use headers or bullet lists unless explicitly asked.\";\n        const text = await window.claude.complete({ messages: [{ role: \"user\", content: prompt }] });\n        return (text || \"\").trim();\n      }\n      throw e;\n    }\n  }\n\n  async function ask(q) {\n    if (busy || !q.trim() || sessionCount >= MAX_MSGS) return;\n    busy = true;\n    sendBtn.disabled = true;\n    addMsg(\"user\", q);\n    convo.push({ role: \"user\", content: q.trim() });\n    sessionCount++;\n    updateCounter();\n    input.value = \"\";\n    const typing = addTyping();\n\n    try {\n      const answer =\n        (await getReply(convo)) ||\n        \"Sorry — I couldn't generate a response just now. Email Elias at elias.arellano.campos@gmail.com.\";\n      typing.remove();\n      const el = addMsg(\"bot\", \"\");\n      convo.push({ role: \"assistant\", content: answer });\n      if (reduce) {\n        renderRich(el, answer);\n        body.scrollTop = body.scrollHeight;\n      } else {\n        let i = 0;\n        const speed = Math.max(6, Math.min(18, 900 / answer.length));\n        (function type() {\n          i += 2;\n          renderRich(el, answer.slice(0, i));\n          body.scrollTop = body.scrollHeight;\n          if (i < answer.length) setTimeout(type, speed);\n        })();\n      }\n    } catch (err) {\n      typing.remove();\n      addMsg(\n        \"bot\",\n        \"The live demo is unavailable right now. You can still reach Elias directly at elias.arellano.campos@gmail.com — and explore the projects above.\"\n      );\n    } finally {\n      busy = false;\n      if (sessionCount >= MAX_MSGS) {\n        lockInput();\n        setTimeout(function () {\n          addMsg(\n            \"bot\",\n            \"That's the 4-message limit for this demo — it's self-funded, so I cap it to keep API costs sane. For anything more, email Elias at elias.arellano.campos@gmail.com or connect on LinkedIn. He'd genuinely love to talk.\"\n          );\n        }, 600);\n      } else {\n        sendBtn.disabled = false;\n        input.focus();\n      }\n    }\n  }\n\n  updateCounter();\n  sendBtn.addEventListener(\"click\", () => ask(input.value));\n  input.addEventListener(\"keydown\", (e) => {\n    if (e.key === \"Enter\") ask(input.value);\n  });\n  suggest.addEventListener(\"click\", (e) => {\n    const btn = e.target.closest(\"button\");\n    if (btn) ask(btn.dataset.q);\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
